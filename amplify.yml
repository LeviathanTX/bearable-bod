version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - npm install
    build:
      commands:
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
        - echo "PREBOARD_AWS_REGION=$PREBOARD_AWS_REGION" >> .env.production
        - echo "PREBOARD_ACCESS_KEY_ID=$PREBOARD_ACCESS_KEY_ID" >> .env.production
        - echo "PREBOARD_SECRET_ACCESS_KEY=$PREBOARD_SECRET_ACCESS_KEY" >> .env.production
        - echo "S3_BUCKET_DOCUMENTS=$S3_BUCKET_DOCUMENTS" >> .env.production
        - echo "SESSION_COOKIE_NAME=$SESSION_COOKIE_NAME" >> .env.production
        - echo "SES_FROM_EMAIL=$SES_FROM_EMAIL" >> .env.production
        - echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
